<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Irrigation</title>

  <style>
    :root {
      --bg-start: #0b3d91;
      --bg-end: #08b3ff;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(255, 255, 255, 0.35);
      --accent: #00c8a3;
      --accent-dark: #00a78a;
      --text: #0c1d2a;
      --muted: rgba(12, 29, 42, 0.7);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      --radius: 16px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 3rem;
    }

    header {
      max-width: 960px;
      width: 100%;
      text-align: center;
      margin-bottom: 2rem;
      padding: 1.2rem 1.5rem;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    header h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.8rem);
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      gap: 1.25rem;
      width: min(980px, 100%);
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      padding: 1.5rem;
      border-radius: var(--radius);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      text-align: left;
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 26px 58px rgba(0, 0, 0, 0.25);
    }

    .card h3 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .card .value {
      margin: 0.5rem 0 0;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .status {
      font-size: 1.1rem;
      padding: 0.4rem 0.6rem;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .status.on {
      background: rgba(0, 200, 163, 0.15);
      color: #00785f;
      border: 1px solid rgba(0, 200, 163, 0.35);
    }

    .status.off {
      background: rgba(255, 79, 79, 0.14);
      color: #b21212;
      border: 1px solid rgba(255, 79, 79, 0.35);
    }

    .buttons {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      width: min(520px, 100%);
    }

    .button {
      flex: 1 1 160px;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      transition: transform var(--transition), filter var(--transition);
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.17);
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.14);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .button:active {
      transform: translateY(0);
      filter: brightness(0.95);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      max-width: 700px;
    }

    @media (max-width: 420px) {
      .button {
        font-size: 0.95rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Smart Irrigation Dashboard</h1>
  </header>

  <main class="grid">
    <section class="card">
      <h3>Soil Moisture</h3>
      <p class="value" id="soil">-- %</p>
    </section>

    <section class="card">
      <h3>Temperature</h3>
      <p class="value" id="temp">-- °C</p>
    </section>

    <section class="card">
      <h3>Humidity</h3>
      <p class="value" id="humidity">-- %</p>
    </section>

    <section class="card">
      <h3>Rain</h3>
      <p class="value" id="rain">--</p>
    </section>

    <section class="card">
      <h3>Pump</h3>
      <p class="value">
        <span id="pump" class="status off">OFF</span>
      </p>
    </section>
  </main>

  <div class="buttons">
    <button class="button" onclick="pumpOn()">Pump ON</button>
    <button class="button button-secondary" onclick="pumpOff()">Pump OFF</button>
  </div>

  <div class="footer">
    <p>Auto-refreshes every 2 seconds. Manual controls override automation until sensors report again.</p>
  </div>

  <script>
    const statusEl = document.getElementById("pump");

    async function loadData() {
      const res = await fetch("/data");
      const data = await res.json();

      document.getElementById("soil").innerText = `${data.soil} %`;
      document.getElementById("temp").innerText = `${data.temperature} °C`;
      document.getElementById("humidity").innerText = `${data.humidity} %`;
      document.getElementById("rain").innerText = data.rain ? "Yes" : "No";
    }

    async function loadPump() {
      const res = await fetch("/command");
      const data = await res.json();

      statusEl.innerText = data.pump;
      statusEl.classList.toggle("on", data.pump === "ON");
      statusEl.classList.toggle("off", data.pump !== "ON");
    }

    async function setPump(value) {
      await fetch("/pump", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pump: value }),
      });

      await loadPump();
    }

    function pumpOn() {
      setPump("ON");
    }

    function pumpOff() {
      setPump("OFF");
    }

    setInterval(loadData, 2000);
    setInterval(loadPump, 2000);

    loadData();
    loadPump();
  </script>
</body>

</html>
